# FightForge API — Fly.io (https://fly.io/docs/reference/configuration/)
#
# If `fly launch` errors with "region  not found", run:
#   flyctl launch --region iad
# or --primary-region iad
#
# Change `app` if the name is taken. Regions: flyctl platform regions

app = "fightforge-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "15s"
  method = "GET"
  path = "/api/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
