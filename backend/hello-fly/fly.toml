# Fly.io — sample Express app (hello-fly). Port must match Dockerfile EXPOSE (8080).
# Change `app` if the name is taken: flyctl apps list

app = "hello-fly"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
